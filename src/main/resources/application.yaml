server:
  port: 8080

spring:
  application:
    name: game-engine-service
  h2:
    console:
      enabled: true
      path: /h2-console

  # H2 Connection Settings (In-Memory)
  datasource:
    url: jdbc:h2:file:./data/tic_tac_toe_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Hibernate/JPA Settings
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

